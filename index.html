<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Invoice Receipt</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        background: #dcdcdc;
        font-family: 'Roboto Mono', monospace;
        margin: 0;
        display: flex;
        justify-content: center;
        padding: 10px;
    }

    .receipt {
        width: 100%;
        max-width: 330px;
        background: #fff;
        padding: 20px;
        box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }

    .line {
        font-size: 13px;
        line-height: 1.25;
        letter-spacing: 0.2px;
        margin: 4px 0;
    }

    .flex {
        display: flex;
        justify-content: space-between;
    }

    .flex span:first-child {
        flex: 1;
        padding-right: 10px;
        word-break: break-word;
    }

    .flex span:last-child {
        min-width: 60px;
        text-align: right;
    }

    .hr {
        border-bottom: 2px solid #000;
        margin: 12px 0;
    }

    .hr-dashed {
        border-bottom: 1px dashed #000;
        margin: 12px 0;
    }

    .barcode-img {
        width: 100%;
        max-width: 250px;
        margin: 20px auto 0;
        display: block;
        filter: grayscale(100%);
    }

    .barcode-img {
    max-width: 180px;
    margin-top: 10px;
    opacity: 0.8;
}

</style>
</head>

<body>
<div class="receipt">

    <div class="line" style="text-align:center;">Coles Supermarkets Australia Pty Ltd</div>
    <div class="line" style="text-align:center;">Tax Invoice ABN: 45 004 189 708</div>
    <div class="line" style="font-size:38px; text-align:center; color:#e31837; font-weight:700;">coles</div>

    <div class="line">Store: 7723 - CS SSC</div>
    <div class="line">Store Manager: Alan Yee</div>
    <div class="line">Phone: (03) 9922 4300</div>
    <div class="line">Served By: Assisted Checkout</div>

    <div class="flex line">
        <span>Register: 111</span>
        <span>Receipt: 493021</span>
    </div>

    <div class="flex line">
        <span>Date: <span id="cur-date"></span></span>
        <span>Time: <span id="cur-time"></span></span>
    </div>

    <div class="hr"></div>
    <div class="flex line" style="font-weight:700;">
        <span>Description</span>
        <span>$</span>
    </div>
    <div class="hr-dashed"></div>

    <div id="items-box">Loading...</div>

    <div class="hr-dashed"></div>

    <div class="flex line">
        <span>SUBTOTAL</span>
        <span id="subtotal-amount">$0.00</span>
    </div>

    <div class="flex line" style="font-weight:700;">
        <span>GST INCLUDED</span>
        <span id="gst-amount">$0.00</span>
    </div>

    <div class="flex line" style="font-weight:700;">
        <span>TOTAL</span>
        <span id="total-amount">$0.00</span>
    </div>

    <div class="hr-dashed"></div>

    <img id="barcode" class="barcode-img" alt="Barcode">

</div>

<script>
function updateTimestamp() {
    const now = new Date();
    document.getElementById('cur-date').innerText = now.toLocaleDateString('en-AU');
    document.getElementById('cur-time').innerText = now.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', hour12:false});
}
updateTimestamp();
setInterval(updateTimestamp, 1000);

function generateBarcode() {
    let receiptNumber = Math.floor(100000000 + Math.random() * 900000000);
    let url = `https://barcode.tec-it.com/barcode.ashx?data=${receiptNumber}&code=Code128&dpi=96`;
    document.getElementById('barcode').src = url;
}
generateBarcode();

function detectMultibuy(items) {
    const groups = {};
    items.forEach(item => {
        if (!groups[item.name]) groups[item.name] = [];
        groups[item.name].push(item);
    });

    const discounts = [];

    Object.keys(groups).forEach(name => {
        const group = groups[name];
        const sample = group[0];

        if (!sample.offerQty || !sample.offerTotal) return;

        const qty = group.length;
        const offerQty = sample.offerQty;
        const offerTotal = sample.offerTotal;
        const unitPrice = sample.price;

        const fullOffers = Math.floor(qty / offerQty);
        if (fullOffers <= 0) return;

        const normalPrice = offerQty * unitPrice * fullOffers;
        const dealPrice = offerTotal * fullOffers;
        const discountValue = normalPrice - dealPrice;

        if (discountValue > 0) {
            discounts.push({
                name: "MULTIBUY DISCOUNT",
                price: -discountValue
            });
        }
    });

    return discounts;
}

async function loadData() {
    const API_URL = "https://script.google.com/macros/s/AKfycbzJ5lairfr3sRnqpWsh_GKAMti_ARi9gILolaeKxBofVrNrqXYrHRdtTTXFWVSJc9xM/exec";

    const res = await fetch(API_URL);
    const data = await res.json();

    let container = document.getElementById('items-box');
    container.innerHTML = "";

    let total = 0;

    data.forEach(item => {
        total += item.price;

        container.innerHTML += `
            <div class="flex line">
                <span>${item.name}</span>
                <span>$${item.price.toFixed(2)}</span>
            </div>
            ${item.code ? `<div class="line" style="font-size:11px; opacity:0.7;">${item.code}</div>` : ""}
        `;
    });

    const discounts = detectMultibuy(data);
    discounts.forEach(d => {
        total += d.price;
        container.innerHTML += `
            <div class="flex line">
                <span>${d.name}</span>
                <span>$${d.price.toFixed(2)}</span>
            </div>
        `;
    });

    document.getElementById('subtotal-amount').innerText = '$' + total.toFixed(2);
    document.getElementById('gst-amount').innerText = '$' + (total / 11).toFixed(2);
    document.getElementById('total-amount').innerText = '$' + total.toFixed(2);
}

loadData();
</script>

</body>
</html>
