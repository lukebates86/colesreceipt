<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Tax Invoice Receipt</title>
    <style>
        body { background: #dcdcdc; font-family: 'Roboto Mono', monospace; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .receipt { width: 100%; max-width: 350px; background: #fff; padding: 15px 20px 25px 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin: -15px -20px 20px -20px; font-weight: 700; border-bottom: 2px solid #dcdcdc; background-color: #fff; position: sticky; top: 0; z-index: 100; }
        .header-icon { width: 26px; height: 26px; object-fit: contain; }
        .logo { font-size: 38px; font-weight: 700; text-align: center; color: #e31837; margin: 5px 0 15px 0; }
        .flex { display: flex; justify-content: space-between; }
        .line { margin: 4px 0; font-size: 13px; font-weight: 400; }
        .hr-dashed { border-bottom: 1px dashed #000; margin: 12px 0; }
        .bold { font-weight: 700; }
        .barcode-img { width: 100%; max-width: 250px; display: block; margin: 20px auto; }
    </style>
</head>
<body>
<div class="receipt">
    <div class="header-bar">
        <img src="Share.png" class="header-icon">
        <span>Digital Receipt</span>
        <img src="close.png" class="header-icon">
    </div>
    <div class="logo">coles</div>
    <div class="flex line bold"><span>Description</span><span>$</span></div>
    <div class="hr-dashed"></div>
    <div id="items-box">Loading...</div>
    <div class="hr-dashed"></div>
    <div class="flex line bold"><span id="item-count-label">Total:</span><span id="total-amount">$0.00</span></div>
    
    <div class="hr-dashed"></div>
    <div class="flex line"><span>EFT</span><span id="eft-amount">$0.00</span></div>
    <div class="flex line bold"><span>GST INCLUDED IN TOTAL</span><span id="gst-amount">$0.00</span></div>
    <div class="hr-dashed" style="margin: 20px 0;"></div>
    <div class="flex line"><span>***** 6784</span><span>MASTERCARD</span></div>
    <div class="flex line bold"><span>PURCHASE</span><span id="card-total">AUD$0.00</span></div>
    <div class="line">AUTH 013657 &nbsp;&nbsp;&nbsp; (00)APPROVED</div>
    <div class="hr-dashed"></div>
    
    <img src="barcode.png" class="barcode-img">
</div>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzJ5lairfr3sRnqpWsh_GKAMti_ARi9gILolaeKxBofVrNrqXYrHRdtTTXFWVSJc9xM/exec';
    async function loadData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            let total = 0;
            let container = document.getElementById('items-box');
            container.innerHTML = '';
            data.forEach(item => {
                let p = parseFloat(item.price) || 0;
                total += p;
                container.innerHTML += `<div class="flex line"><span>${item.name}</span><span>${p.toFixed(2)}</span></div>`;
            });
            document.getElementById('total-amount').innerText = '$' + total.toFixed(2);
            document.getElementById('eft-amount').innerText = '$' + total.toFixed(2);
            document.getElementById('gst-amount').innerText = '$' + (total / 11).toFixed(2);
            document.getElementById('card-total').innerText = 'AUD$' + total.toFixed(2);
            document.getElementById('item-count-label').innerText = `Total for ${data.length} items:`;
        } catch(e) { 
            document.getElementById('items-box').innerHTML = '<div class="line">Error loading items</div>';
        }
    }
    loadData();
</script>
</body>
</html>
