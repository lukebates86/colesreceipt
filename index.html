<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Invoice Receipt</title>
    <style>
        body { background: #dcdcdc; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; padding: 10px; color: #000; margin: 0; }
        .receipt { width: 100%; max-width: 350px; background: #fff; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .logo { font-size: 38px; font-weight: 900; text-align: center; color: #e31837; }
        .flex { display: flex; justify-content: space-between; }
        .line { margin: 4px 0; font-size: 13px; }
        .hr-dashed { border-bottom: 1px dashed #000; margin: 10px 0; }
        .bold { font-weight: bold; }
    </style>
</head>
<body>
<div class="receipt">
    <div class="logo">coles</div>
    <div id="items-box">Loading...</div>
    <div class="hr-dashed"></div>
    <div class="flex bold"><span>Total:</span><span id="total-amount">$0.00</span></div>
</div>

<script>
    // Paste your NEW /exec URL here
    const API_URL = 'PASTE_YOUR_URL_HERE';

    async function loadReceiptData() {
        try {
            // Using a proxy to bypass the CORS block
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
            const response = await fetch(proxyUrl);
            const items = await response.json();
            
            let container = document.getElementById('items-box');
            container.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="flex line"><span>${item.name}</span><span>$${item.price.toFixed(2)}</span></div>`;
            });
            
            document.getElementById('total-amount').innerText = '$' + total.toFixed(2);
        } catch (e) {
            document.getElementById('items-box').innerHTML = 'Error loading data.';
            console.error(e);
        }
    }
    loadReceiptData();
</script>
</body>
</html>
