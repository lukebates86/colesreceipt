<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kmart Digital Receipt</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: 'Inter', sans-serif;
    }

    .receipt {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .header-bar {
      position: sticky;
      top: 0;
      z-index: 999;
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-weight: 600;
      font-size: 18px;
    }

    .header-close {
      font-size: 20px;
      cursor: pointer;
    }

    .swipe-fade {
      height: 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0));
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .total {
      font-weight: 700;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="receipt">

    <div class="swipe-fade"></div>

    <div class="header-bar">
      <div class="header-title">Kmart Digital Receipt</div>
      <div class="header-close">✕</div>
    </div>

    <!-- All receipt content now lives directly under .receipt -->
    <div class="section">
      <div class="section-title">Order Summary</div>
      <div class="item"><span>Item A</span><span>$10.00</span></div>
      <div class="item"><span>Item B</span><span>$5.00</span></div>
      <div class="total">Total: $15.00</div>
    </div>

    <div class="section">
      <div class="section-title">Payment</div>
      <div class="item"><span>Card</span><span>•••• 1234</span></div>
    </div>

    <div class="section">
      <div class="section-title">Store Details</div>
      <div>Kmart Werribee</div>
      <div>123 Example St</div>
    </div>

  </div>

<script>
/* Timestamp logic */
function updateTimestamp() {
    const now = new Date();
    const d = now.toLocaleDateString('en-AU');
    const dS = now.toLocaleDateString('en-AU', {day:'2-digit', month:'2-digit', year:'2-digit'});
    const t = now.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', hour12:false});

    document.getElementById('cur-date').innerText = d;
    document.getElementById('cur-date2').innerText = dS;
    document.getElementById('cur-time').innerText = t;
    document.getElementById('cur-time2').innerText = t;
}
updateTimestamp();
setInterval(updateTimestamp, 1000);

/* Barcode */
function generateBarcode() {
    let receiptNumber = Math.floor(100000000 + Math.random() * 900000000);
    let url = `https://barcode.tec-it.com/barcode.ashx?data=${receiptNumber}&code=Code128&dpi=96`;
    document.getElementById('barcode').src = url;
}
generateBarcode();

/* Swipe-down fade logic */
let lastScroll = 0;
const fade = document.getElementById("swipeFade");

document.addEventListener("scroll", () => {
    const current = window.scrollY;
    if (current < lastScroll && current < 40) {
        fade.classList.add("visible");
    } else {
        fade.classList.remove("visible");
    }
    lastScroll = current;
});

/* Smooth scroll-to-top snap */
let scrollTimeout;
document.addEventListener("scroll", () => {
    clearTimeout(scrollTimeout);

    scrollTimeout = setTimeout(() => {
        if (window.scrollY < 25) {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }
    }, 120);
});

/* Tap header to scroll to top */
document.querySelector(".header-bar").addEventListener("click", () => {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

/* Multibuy logic */
function detectMultibuy(items) {
    const groups = {};
    items.forEach(item => {
        if (!groups[item.name]) groups[item.name] = [];
        groups[item.name].push(item);
    });

    const discounts = [];

    Object.keys(groups).forEach(name => {
        const group = groups[name];
        const sample = group[0];

        if (!sample.offerQty || !sample.offerTotal) return;

        const qty = group.length;
        const offerQty = sample.offerQty;
        const offerTotal = sample.offerTotal;
        const unitPrice = sample.price;

        const fullOffers = Math.floor(qty / offerQty);
        if (fullOffers <= 0) return;

        const normalPrice = offerQty * unitPrice * fullOffers;
        const dealPrice = offerTotal * fullOffers;
        const discountValue = normalPrice - dealPrice;

        if (discountValue > 0) {
            discounts.push({
                name: "MULTIBUY DISCOUNT",
                price: -discountValue
            });
        }
    });

    return discounts;
}

/* Load data */
async function loadData() {
    const API_URL = "https://script.google.com/macros/s/AKfycbzJ5lairfr3sRnqpWsh_GKAMti_ARi9gILolaeKxBofVrNrqXYrHRdtTTXFWVSJc9xM/exec";

    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let container = document.getElementById('items-box');
        container.innerHTML = "";

        let total = 0;

        data.forEach(item => {
            total += item.price;

            container.innerHTML += `
                <div class="flex line">
                    <span>${item.name}</span>
                    <span>$${item.price.toFixed(2)}</span>
                </div>
                ${item.code ? `<div class="item-code">${item.code}</div>` : ""}
            `;
        });

        const discounts = detectMultibuy(data);
        discounts.forEach(d => {
            total += d.price;
            container.innerHTML += `
                <div class="flex line discount-line">
                    <span>${d.name}</span>
                    <span>$${d.price.toFixed(2)}</span>
                </div>
            `;
        });

        document.getElementById('subtotal-amount').innerText = '$' + total.toFixed(2);
        document.getElementById('gst-amount').innerText = '$' + (total / 11).toFixed(2);
        document.getElementById('total-amount').innerText = '$' + total.toFixed(2);

        document.getElementById('eft-amount').innerText = '$' + total.toFixed(2);
        document.getElementById('gst-total-amount').innerText = '$' + (total / 11).toFixed(2);
        document.getElementById('card-total').innerText = '$' + total.toFixed(2);

    } catch (e) {
        document.getElementById('items-box').innerText = 'Error loading items';
        console.error(e);
    }
}

loadData();

/* PWA: register service worker */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
    });
}
</script>

</body>
</html>
