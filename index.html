<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Tax Invoice Receipt</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #dcdcdc; font-family: 'Roboto Mono', monospace; display: flex; justify-content: center; padding: 10px; color: #000; margin: 0; min-height: 100vh; }
        .receipt { width: 100%; max-width: 350px; background: #fff; padding: 15px 20px 25px 20px; box-shadow: 0 0 15px rgba(0,0,0,0.15); align-self: flex-start; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin: -15px -20px 20px -20px; font-weight: 700; font-size: 16px; border-bottom: 2px solid #dcdcdc; background-color: #fff; position: sticky; top: 0; z-index: 100; }
        .header-icon { width: 26px; height: 26px; object-fit: contain; display: block; }
        .logo { font-size: 38px; font-weight: 700; text-align: center; color: #e31837; margin: 5px 0 15px 0; letter-spacing: -2px; }
        .text-center { text-align: center; }
        .flex { display: flex; justify-content: space-between; gap: 10px; }
        .line { margin: 4px 0; font-size: 13px; line-height: 1.4; font-weight: 400; } 
        .hr { border-bottom: 2px solid #000; margin: 10px 0; }
        .hr-dashed { border-bottom: 1px dashed #000; margin: 12px 0; }
        .bold { font-weight: 700; } 
        .barcode-container { text-align: center; margin-top: 30px; margin-bottom: 10px; }
        .barcode-img { width: 100%; max-width: 250px; height: auto; object-fit: contain; }
    </style>
</head>
<body>
<div class="receipt">
    <div class="header-bar">
        <img src="Share.png" alt="Share" class="header-icon">
        <span>Digital Receipt</span>
        <img src="close.png" alt="Close" class="header-icon">
    </div>
    <div class="line text-center">Coles Supermarkets Australia Pty Ltd</div>
    <div class="logo">coles</div>
    <div class="hr"></div>
    <div class="flex line"><span class="bold">Description</span><span class="bold">$</span></div>
    <div class="hr-dashed"></div>
    <div id="items-box"></div>
    <div class="hr-dashed"></div>
    <div class="flex line bold"><span id="item-count-label">Total:</span><span id="total-amount">$0.00</span></div>
    <div class="barcode-container"><img src="barcode.png" alt="Barcode" class="barcode-img"></div>
</div>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzJ5lairfr3sRnqpWsh_GKAMti_ARi9gILolaeKxBofVrNrqXYrHRdtTTXFWVSJc9xM/exec';
    async function loadData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            let total = 0, container = document.getElementById('items-box');
            container.innerHTML = '';
            data.forEach(item => {
                let p = parseFloat(item.price);
                total += p;
                container.innerHTML += `<div class="flex line"><span>${item.name}</span><span>${p.toFixed(2)}</span></div>`;
            });
            document.getElementById('total-amount').innerText = '$' + total.toFixed(2);
            document.getElementById('item-count-label').innerText = `Total for ${data.length} items:`;
        } catch(e) { console.error(e); }
    }
    loadData();
</script>
</body>
</html>
